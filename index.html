<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Учёт сбора средств</title>
    <!-- При двойном щелчке по index.html с диска ведём в docs/index.html (после npm run build) -->
    <script>
      ;(function () {
        try {
          if (location.protocol === 'file:') {
            var u = location.href.replace(/\\/g, '/')
            if (u.indexOf('docs/index.html') === -1) {
              location.replace(new URL('docs/index.html', location.href).href)
            }
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
